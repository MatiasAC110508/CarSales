<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoMarket Pro | Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen p-8 text-slate-800">
    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-10 border-b pb-6">
            <div>
                <h1 class="text-3xl font-bold text-slate-900">AutoMarket Pro</h1>
                <p class="text-slate-500">Real-time Vehicle Inventory Management</p>
            </div>
            <button id="refresh-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-6 rounded-lg shadow-md transition-all active:scale-95">
                Refresh Fleet
            </button>
        </header>
        
        <main id="car-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            </main>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
